name: Build and Push to Docker Hub

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-push:
    name: Build and Push
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - dockerfile: docker/app.Dockerfile
            context: .
            image: agentnxxt/nocobuilder
          - dockerfile: docker/realtime.Dockerfile
            context: .
            image: agentnxxt/nocobuilder-realtime
          - dockerfile: docker/db.Dockerfile
            context: .
            image: agentnxxt/nocobuilder-migrations
          - dockerfile: mcp-servers/ghost-mcp-server/Dockerfile
            context: mcp-servers/ghost-mcp-server
            image: agentnxxt/ghost-mcp-server
          - dockerfile: mcp-servers/hostinger-mcp/Dockerfile
            context: mcp-servers/hostinger-mcp
            image: agentnxxt/hostinger-mcp
          - dockerfile: mcp-servers/logto-mcp-server/Dockerfile
            context: mcp-servers/logto-mcp-server
            image: agentnxxt/logto-mcp-server

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate tags
        id: meta
        run: |
          IMAGE="${{ matrix.image }}"
          SHA="${{ github.sha }}"
          SHORT_SHA="${SHA:0:7}"
          echo "tags=${IMAGE}:latest,${IMAGE}:${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
